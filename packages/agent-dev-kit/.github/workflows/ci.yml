name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Smoke test CLI scaffolding
        run: node dist/cli.js create ci-smoke-agent --features=memory,skills --no-git --no-install

      - name: Verify generated scaffold
        run: |
          test -f ci-smoke-agent/package.json
          test -f ci-smoke-agent/.ai/AGENTS.md
          test -f ci-smoke-agent/src/index.ts
